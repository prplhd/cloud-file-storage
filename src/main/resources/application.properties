spring.application.name=cloud-file-storage

spring.config.import=optional:file:.env[.properties]
logging.level.root=INFO

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

minio.url=${MINIO_URL}
minio.root.user=${MINIO_ROOT_USER}
minio.root.password=${MINIO_ROOT_PASSWORD}
minio.bucket.name=user-files

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=105MB
server.tomcat.max-part-count=50